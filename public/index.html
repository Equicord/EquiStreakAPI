<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EquiStreak API</title>
    <meta name="description" content="The blazing fast backend powering Equicord Streaks.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #09090b;
            --accent-purple: #9b39fe;
            --accent-pink: #f7409c;
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated Background Blobs */
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            z-index: 0;
            animation: float 20s infinite ease-in-out alternate;
        }

        .blob-1 {
            width: 400px;
            height: 400px;
            background: var(--accent-purple);
            top: -10%;
            left: -10%;
            opacity: 0.4;
        }

        .blob-2 {
            width: 350px;
            height: 350px;
            background: var(--accent-pink);
            bottom: -10%;
            right: -10%;
            opacity: 0.3;
            animation-delay: -10s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 50px) scale(1.2); }
        }

        /* Glassmorphism Container */
        .container {
            position: relative;
            z-index: 1;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 3.5rem 3rem;
            width: 90%;
            max-width: 500px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transform: translateY(20px);
            opacity: 0;
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideUp {
            to { transform: translateY(0); opacity: 1; }
        }

        .header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        h1 {
            font-size: 2.75rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #ffffff, #a1a1aa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .subtitle {
            color: var(--text-muted);
            font-weight: 300;
            font-size: 1.1rem;
            line-height: 1.5;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
            padding: 6px 14px;
            border-radius: 99px;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(16, 185, 129, 0.2);
            transition: all 0.3s ease;
        }

        .status-badge.offline {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border-color: rgba(239, 68, 68, 0.2);
        }

        .pulse {
            width: 8px;
            height: 8px;
            background-color: currentColor;
            border-radius: 50%;
            animation: pulsing 2s infinite cubic-bezier(0.4, 0, 0.6, 1);
        }

        @keyframes pulsing {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 2.5rem;
        }

        .stat-card {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            padding: 1.5rem;
            border-radius: 16px;
            text-align: center;
            transition: transform 0.3s ease, background 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.05);
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
            color: var(--text-main);
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-group {
            display: flex;
            gap: 1rem;
        }

        .btn {
            flex: 1;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
            border-radius: 12px;
            font-family: 'Outfit', sans-serif;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            border: none;
            font-size: 1rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-pink));
            color: white;
            box-shadow: 0 4px 15px rgba(155, 57, 254, 0.25);
        }

        .btn-primary:hover {
            transform: scale(1.03);
            box-shadow: 0 6px 20px rgba(155, 57, 254, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            border: 1px solid var(--glass-border);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.03);
        }
        
        .loading {
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            border-top-color: var(--accent-purple);
            animation: spin 1s ease-in-out infinite;
            margin: 10px 0;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <main class="container">
        <div class="header">
            <div id="statusIndicator" class="status-badge">
                <div class="pulse"></div>
                <span id="statusText">Checking Systems...</span>
            </div>
            <h1>EquiStreak API</h1>
            <p class="subtitle">The blazing fast backend powering Equicord Streaks.</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="totalStreaks"><div class="loading"></div></div>
                <div class="stat-label">Total Streaks</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="activeUsers"><div class="loading"></div></div>
                <div class="stat-label">Users Today</div>
            </div>
        </div>

        <div class="btn-group">
            <a href="/metrics" class="btn btn-primary">View Metrics</a>
            <a href="/health" class="btn btn-secondary">Health Check</a>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const statusIndicator = document.getElementById('statusIndicator');
            const statusText = document.getElementById('statusText');
            const totalStreaksEl = document.getElementById('totalStreaks');
            const activeUsersEl = document.getElementById('activeUsers');

            try {
                const healthRes = await fetch('/health');
                if (healthRes.ok) {
                    statusText.textContent = 'All Systems Operational';
                } else {
                    throw new Error('API Offline');
                }

                const metricsRes = await fetch('/metrics');
                const metricsData = await metricsRes.json();
                
                animateValue(totalStreaksEl, 0, metricsData.streaks_total || 0, 1500);
                animateValue(activeUsersEl, 0, metricsData.users_day || 0, 1500);

            } catch (error) {
                statusIndicator.classList.add('offline');
                statusText.textContent = 'Service Disconnected';
                totalStreaksEl.innerHTML = '<span style="font-size: 1.5rem; color: #ef4444;">Offline</span>';
                activeUsersEl.innerHTML = '<span style="font-size: 1.5rem; color: #ef4444;">Offline</span>';
            }
        });

        function animateValue(obj, start, end, duration) {
            if (end === 0) {
                obj.textContent = "0";
                return;
            }
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                const ease = 1 - Math.pow(1 - progress, 4);
                obj.textContent = Math.floor(ease * (end - start) + start).toLocaleString();
                if (progress < 1) {
                    window.requestAnimationFrame(step);
                }
            };
            window.requestAnimationFrame(step);
        }
    </script>
</body>
</html>
